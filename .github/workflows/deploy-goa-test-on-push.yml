name: Deploy GOA Test On Push

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      RESOURCE_GROUP: FleetBridgeGOATestRG
      PARAMETERS_FILE: infra/parameters.goa-test.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Container App Infrastructure and Image
        env:
          FUNCTION_IMAGE_TAG_OVERRIDE: ${{ github.sha }}
        run: bash ./scripts/deploy-container-app.sh "${RESOURCE_GROUP}" "${PARAMETERS_FILE}"

      - name: Decode Exchange Certificate
        env:
          EXCHANGE_PFX_BASE64: ${{ secrets.EXCHANGE_PFX_BASE64 }}
        run: |
          printf '%s' "${EXCHANGE_PFX_BASE64}" | base64 --decode > /tmp/exchange-cert.pfx

      - name: Seed Key Vault Secrets
        env:
          MYGEOTAB_DATABASE: ${{ secrets.MYGEOTAB_DATABASE }}
          MYGEOTAB_USERNAME: ${{ secrets.MYGEOTAB_USERNAME }}
          MYGEOTAB_PASSWORD: ${{ secrets.MYGEOTAB_PASSWORD }}
          EXCHANGE_PFX_PASSWORD: ${{ secrets.EXCHANGE_PFX_PASSWORD }}
        run: |
          KEY_VAULT_NAME="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["parameters"]["keyVaultName"]["value"])' "${PARAMETERS_FILE}")"
          EQUIPMENT_DOMAIN="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["parameters"]["equipmentDomain"]["value"])' "${PARAMETERS_FILE}")"
          bash ./scripts/seed-key-vault-secrets.sh \
            "${KEY_VAULT_NAME}" \
            "${MYGEOTAB_DATABASE}" \
            "${MYGEOTAB_USERNAME}" \
            "${MYGEOTAB_PASSWORD}" \
            /tmp/exchange-cert.pfx \
            "${EXCHANGE_PFX_PASSWORD}" \
            "${EQUIPMENT_DOMAIN}"

      - name: Smoke Test Health
        run: |
          CONTAINER_APP_NAME="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["parameters"]["containerAppName"]["value"])' "${PARAMETERS_FILE}")"
          CONTAINER_APP_FQDN="$(az containerapp show --name "${CONTAINER_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query properties.configuration.ingress.fqdn -o tsv)"
          curl -fsS "https://${CONTAINER_APP_FQDN}/api/health"

      - name: Smoke Test Sync
        run: |
          CONTAINER_APP_NAME="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["parameters"]["containerAppName"]["value"])' "${PARAMETERS_FILE}")"
          CONTAINER_APP_FQDN="$(az containerapp show --name "${CONTAINER_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query properties.configuration.ingress.fqdn -o tsv)"
          JOB_ID="$(curl -fsS -X POST \
            "https://${CONTAINER_APP_FQDN}/api/sync-to-exchange" \
            -H 'Content-Type: application/json' \
            -d '{"maxDevices":1}' | python3 -c 'import json,sys; print(json.load(sys.stdin)["jobId"])')"
          echo "Queued sync job: ${JOB_ID}"
          POLL_FAILURES=0
          for attempt in $(seq 1 60); do
            if ! STATUS_JSON="$(curl -fsS --max-time 20 "https://${CONTAINER_APP_FQDN}/api/sync-status?jobId=${JOB_ID}")"; then
              POLL_FAILURES=$((POLL_FAILURES + 1))
              echo "Sync status poll failed (${attempt}/60), consecutive failures: ${POLL_FAILURES}"
              if [ "${POLL_FAILURES}" -ge 6 ]; then
                echo "Sync status polling failed too many times in a row"
                exit 1
              fi
              sleep 10
              continue
            fi
            POLL_FAILURES=0
            STATUS="$(printf '%s' "${STATUS_JSON}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])')"
            echo "Sync status (${attempt}/60): ${STATUS}"
            if [ "${STATUS}" = "completed" ]; then
              printf '%s' "${STATUS_JSON}" | python3 -c 'import json,sys; data=json.load(sys.stdin); raise SystemExit(0 if data["failed"] == 0 else 1)'
              exit 0
            fi
            if [ "${STATUS}" = "failed" ]; then
              echo "${STATUS_JSON}"
              exit 1
            fi
            sleep 5
          done
          echo "Sync job did not complete in time"
          exit 1
