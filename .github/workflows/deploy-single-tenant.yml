name: Deploy Single-Tenant Container App

"on":
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group name
        required: true
        type: string
      parameters_file:
        description: Checked-in infra parameter file
        required: true
        default: infra/parameters.goa-test.json
        type: string
      run_smoke_sync:
        description: Run a one-device sync smoke test after deployment
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Container App Infrastructure and Image
        env:
          FUNCTION_IMAGE_TAG_OVERRIDE: ${{ github.sha }}
        run: bash ./scripts/deploy-container-app.sh "${{ inputs.resource_group }}" "${{ inputs.parameters_file }}"

      - name: Decode Exchange Certificate
        env:
          EXCHANGE_PFX_BASE64: ${{ secrets.EXCHANGE_PFX_BASE64 }}
        run: |
          if [ -z "${EXCHANGE_PFX_BASE64}" ]; then
            echo "Missing GitHub secret: EXCHANGE_PFX_BASE64"
            exit 1
          fi
          printf '%s' "${EXCHANGE_PFX_BASE64}" | base64 --decode > /tmp/exchange-cert.pfx

      - name: Seed Key Vault Secrets
        env:
          MYGEOTAB_DATABASE: ${{ secrets.MYGEOTAB_DATABASE }}
          MYGEOTAB_USERNAME: ${{ secrets.MYGEOTAB_USERNAME }}
          MYGEOTAB_PASSWORD: ${{ secrets.MYGEOTAB_PASSWORD }}
          EXCHANGE_PFX_PASSWORD: ${{ secrets.EXCHANGE_PFX_PASSWORD }}
        run: |
          KEY_VAULT_NAME="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["parameters"]["keyVaultName"]["value"])' "${{ inputs.parameters_file }}")"
          EQUIPMENT_DOMAIN="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["parameters"]["equipmentDomain"]["value"])' "${{ inputs.parameters_file }}")"

          bash ./scripts/seed-key-vault-secrets.sh \
            "${KEY_VAULT_NAME}" \
            "${MYGEOTAB_DATABASE}" \
            "${MYGEOTAB_USERNAME}" \
            "${MYGEOTAB_PASSWORD}" \
            /tmp/exchange-cert.pfx \
            "${EXCHANGE_PFX_PASSWORD}" \
            "${EQUIPMENT_DOMAIN}"

      - name: Smoke Test Health
        run: |
          CONTAINER_APP_NAME="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["parameters"]["containerAppName"]["value"])' "${{ inputs.parameters_file }}")"
          CONTAINER_APP_FQDN="$(az containerapp show --name "${CONTAINER_APP_NAME}" --resource-group "${{ inputs.resource_group }}" --query properties.configuration.ingress.fqdn -o tsv)"
          curl -fsS "https://${CONTAINER_APP_FQDN}/api/health"

      - name: Smoke Test Sync
        if: ${{ inputs.run_smoke_sync }}
        run: |
          CONTAINER_APP_NAME="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["parameters"]["containerAppName"]["value"])' "${{ inputs.parameters_file }}")"
          CONTAINER_APP_FQDN="$(az containerapp show --name "${CONTAINER_APP_NAME}" --resource-group "${{ inputs.resource_group }}" --query properties.configuration.ingress.fqdn -o tsv)"
          JOB_ID="$(curl -fsS -X POST \
            "https://${CONTAINER_APP_FQDN}/api/sync-to-exchange" \
            -H 'Content-Type: application/json' \
            -d '{"maxDevices":1}' | python3 -c 'import json,sys; print(json.load(sys.stdin)["jobId"])')"
          echo "Queued sync job: ${JOB_ID}"
          POLL_FAILURES=0
          for attempt in $(seq 1 60); do
            if ! STATUS_JSON="$(curl -fsS --max-time 20 "https://${CONTAINER_APP_FQDN}/api/sync-status?jobId=${JOB_ID}")"; then
              POLL_FAILURES=$((POLL_FAILURES + 1))
              echo "Sync status poll failed (${attempt}/60), consecutive failures: ${POLL_FAILURES}"
              if [ "${POLL_FAILURES}" -ge 6 ]; then
                echo "Sync status polling failed too many times in a row"
                exit 1
              fi
              sleep 10
              continue
            fi
            POLL_FAILURES=0
            STATUS="$(printf '%s' "${STATUS_JSON}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])')"
            echo "Sync status (${attempt}/60): ${STATUS}"
            if [ "${STATUS}" = "completed" ]; then
              printf '%s' "${STATUS_JSON}" | python3 -c 'import json,sys; data=json.load(sys.stdin); raise SystemExit(0 if data["failed"] == 0 else 1)'
              exit 0
            fi
            if [ "${STATUS}" = "failed" ]; then
              echo "${STATUS_JSON}"
              exit 1
            fi
            sleep 5
          done
          echo "Sync job did not complete in time"
          exit 1
